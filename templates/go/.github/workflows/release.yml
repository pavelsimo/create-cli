name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: goreleaser
    if: ${{ !contains(needs.goreleaser.outputs.tag, '-') }}  # skip pre-releases
    steps:
      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          RELEASE_TAG: ${{ needs.goreleaser.outputs.tag }}
          FORMULA: {{TOOL_NAME}}
          TAP_REPO: {{HOMEBREW_TAP}}
        run: |
          request_id="${FORMULA}-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gh workflow run update-formula.yml \
            --repo "$TAP_REPO" \
            --ref main \
            -f formula="$FORMULA" \
            -f tag="$RELEASE_TAG" \
            -f repository="{{GITHUB_USER}}/{{TOOL_NAME}}" \
            -f request_id="$request_id"
          echo "Dispatched tap update for $RELEASE_TAG"
